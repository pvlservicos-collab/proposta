<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Imóvel | Imobiliária Premium</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- Swiper CSS for image gallery -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css">

    <style>
        :root {
            --color-sand: #E8E2D5;
            --color-sand-dark: #D4C9B5;
            --color-charcoal: #2B2B2B;
            --color-gold: #C9A961;
            --color-gold-dark: #B89750;
            --color-white: #FEFDFB;
            --color-gray: #6B6B6B;
            --font-display: 'Cormorant Garamond', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            color: var(--color-charcoal);
            background: var(--color-white);
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1.5rem 6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(254, 253, 251, 0.98);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.05);
        }

        .logo {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            color: var(--color-charcoal);
            text-decoration: none;
        }

        .back-link {
            font-size: 0.85rem;
            color: var(--color-gray);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--color-gold);
        }

        /* Gallery */
        .gallery-section {
            margin-top: 80px;
            height: 70vh;
            position: relative;
        }

        .swiper {
            width: 100%;
            height: 100%;
        }

        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Content */
        .content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 4rem 6rem;
        }

        .property-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--color-sand);
        }

        .property-title {
            font-family: var(--font-display);
            font-size: 4rem;
            font-weight: 300;
            color: var(--color-charcoal);
            margin-bottom: 1rem;
        }

        .property-location-big {
            font-size: 1.2rem;
            color: var(--color-gray);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .property-price-big {
            font-family: var(--font-display);
            font-size: 3.5rem;
            font-weight: 500;
            color: var(--color-gold);
        }

        .whatsapp-button {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            padding: 1.2rem 2.5rem;
            background: #25D366;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-weight: 500;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .whatsapp-button:hover {
            background: #128C7E;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3);
        }

        .details-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 4rem;
            margin-bottom: 4rem;
        }

        .description h2 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 2rem;
            color: var(--color-charcoal);
        }

        .description p {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--color-gray);
            margin-bottom: 1.5rem;
        }

        .specs {
            background: var(--color-sand);
            padding: 2rem;
        }

        .specs h3 {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: 2rem;
            color: var(--color-charcoal);
        }

        .spec-item {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid var(--color-sand-dark);
        }

        .spec-item:last-child {
            border-bottom: none;
        }

        .spec-label {
            font-size: 0.9rem;
            color: var(--color-gray);
        }

        .spec-value {
            font-weight: 500;
            color: var(--color-charcoal);
        }

        .caracteristicas {
            margin-top: 4rem;
        }

        .caracteristicas h3 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 2rem;
            color: var(--color-charcoal);
        }

        .caracteristicas-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .caracteristica-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem;
            background: var(--color-sand);
            font-size: 0.9rem;
            color: var(--color-gray);
        }

        .video-section {
            margin-top: 4rem;
        }

        .video-section h3 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 2rem;
            color: var(--color-charcoal);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .loading {
            padding: 4rem;
            text-align: center;
            font-size: 1.2rem;
            color: var(--color-gray);
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav {
                padding: 1.5rem 2rem;
            }

            .content {
                padding: 3rem 2rem;
            }

            .property-header {
                flex-direction: column;
                gap: 2rem;
            }

            .property-title {
                font-size: 2.5rem;
            }

            .property-price-big {
                font-size: 2.5rem;
            }

            .details-grid {
                grid-template-columns: 1fr;
            }

            .caracteristicas-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav>
        <a href="index.html" class="logo">IMOBILIÁRIA PREMIUM</a>
        <a href="index.html" class="back-link">← Voltar</a>
    </nav>

    <!-- Loading State -->
    <div id="loading" class="loading">Carregando detalhes do imóvel...</div>

    <!-- Gallery -->
    <div id="gallery" class="gallery-section" style="display: none;">
        <div class="swiper">
            <div class="swiper-wrapper" id="gallery-images"></div>
            <div class="swiper-pagination"></div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
        </div>
    </div>

    <!-- Content -->
    <div id="content" class="content" style="display: none;"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>

    <!-- App Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/imovel.js"></script>
</body>

</html>
